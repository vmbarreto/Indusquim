<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi contenido — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" style="display:block;"><img src="../../assets/images/logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__link" id="homeLink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Mi portal
      </a>
      <a href="catalogo.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Hacer pedido
      </a>
      <a href="pedidos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Mis pedidos
      </a>
      <a href="archivos.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Mi contenido
      </a>
      <a href="pqrs.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        PQRS
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="clientName">—</strong>
        <span id="clientCompany">—</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>

    <div style="text-align:center;font-size:0.65rem;color:rgba(255,255,255,0.3);padding-bottom:6px;letter-spacing:0.05em;">v2.0</div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Mi contenido</span>
    </div>

    <div class="page-body">

      <!-- Tabs principales -->
      <div class="tabs" style="margin-bottom:24px;">
        <button class="tab-btn active" data-tab="general">Contenido General</button>
        <button class="tab-btn" data-tab="personal" id="tabPersonal" style="display:none;">Mi Contenido</button>
      </div>

      <!-- TAB: Material General (todos los clientes) -->
      <div class="tab-panel active" id="tab-general">
        <div class="card" style="margin-bottom:20px;">
          <div class="card__title">Documentos soporte</div>
          <div class="file-list" id="generalSoporte">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card__title">Capacitaciones</div>
          <div class="file-list" id="generalPresentaciones">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
        <div class="card">
          <div class="card__title">Videos de capacitaciones</div>
          <div class="video-grid" id="generalVideos">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
      </div>

      <!-- TAB: Mi Material (solo clientes grandes) -->
      <div class="tab-panel" id="tab-personal">
        <div class="card" style="margin-bottom:20px;">
          <div class="card__title">Informes de visita</div>
          <div class="file-list" id="personalInformes">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card__title">Documentos soporte</div>
          <div class="file-list" id="personalSoporte">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card__title">Capacitaciones</div>
          <div class="file-list" id="personalPresentaciones">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
        <div class="card">
          <div class="card__title">Videos de capacitaciones</div>
          <div class="video-grid" id="personalVideos">
            <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/cliente/archivos.js"></script>
</body>
</html>
