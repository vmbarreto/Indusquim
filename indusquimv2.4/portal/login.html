<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Indusquim — Acceso</title>
  <link rel="stylesheet" href="assets/css/portal.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-box">

      <div class="login-box__logo">
        <a href="../index.html" title="Volver al sitio principal">
          <img src="../assets/images/logo-indusquim.png" alt="Indusquim" />
        </a>
        <h1 class="login-box__title">Portal de Clientes</h1>
        <p class="login-box__sub" id="loginSub">Ingresa tus credenciales para continuar</p>
      </div>

      <div class="alert alert--error"   id="errorMsg"></div>
      <div class="alert alert--success" id="successMsg"></div>

      <!-- ── Formulario de login ── -->
      <!-- 'id' sirve para que JavaScript pueda encontrar este formulario y decir "cuando me envíen, haz X" -->
      <form id="loginForm">
        
        <!-- Cada campo se envuelve en un 'form-group' para mantener separación visual (CSS) -->
        <div class="form-group">
          <!-- 'for' debe ser igual al 'id' del input para que al hacer clic en el texto, se active el cuadro (Accesibilidad y UX) -->
          <label class="form-label" for="username">Correo electrónico o Celular</label>
          <input type="text" id="username" class="form-input" placeholder="tu@empresa.com o 3001234567" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña o PIN (Comerciales)</label>
          <div class="input-password-wrap">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:8px;" id="submitBtn">
          Ingresar al portal
        </button>
        <div style="text-align:center;margin-top:16px;">
          <a href="#" id="forgotLink" style="font-size:0.8rem;color:var(--c-muted);">¿Olvidaste tu contraseña?</a>
        </div>
      </form>

      <!-- ── Formulario de recuperación (email) ── -->
      <form id="forgotForm" style="display:none;">
        <div class="form-group">
          <label class="form-label" for="recoverEmail">Correo electrónico registrado</label>
          <input type="email" id="recoverEmail" class="form-input" placeholder="tu@empresa.com" required />
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;" id="recoverBtn">
          Enviar enlace de recuperación
        </button>
        <div style="text-align:center;margin-top:16px;">
          <a href="#" id="backToLogin" style="font-size:0.8rem;color:var(--c-muted);">← Volver al inicio</a>
        </div>
      </form>

      <!-- ── Formulario de nueva contraseña (desde link email) ── -->
      <form id="resetForm" style="display:none;">
        <div class="form-group">
          <label class="form-label" for="newPassword">Nueva contraseña</label>
          <div class="input-password-wrap">
            <input type="password" id="newPassword" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password" />
            <button type="button" class="pwd-toggle" id="pwdToggle2" aria-label="Mostrar contraseña">
              <svg id="eyeIcon2" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repite la contraseña" required minlength="8" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;" id="resetBtn">
          Guardar nueva contraseña
        </button>
      </form>

    </div>
  </div>

  <!-- 
    ZONA DE SCRIPTS (AL FINAL DEL BODY):
    Siempre colocamos las librerías externas hasta el final del '<body>'.
    Esto hace que las librerías pesadas no bloqueen la carga visual de la página.
    El usuario primero "ve" la página visualmente, y luego se le añade la "funcionalidad" por detrás.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  
  <!-- Aquí cargamos nuestro script modular limpio (Separación de Funciones) -->
  <script src="assets/js/login.js"></script>
</body>
</html>
