<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Portal — Indusquim</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" title="Volver al sitio principal" style="display:block;"><img src="../../logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Mi portal
      </a>
      <a href="catalogo.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Catálogo
      </a>
      <a href="pedidos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Mis pedidos
      </a>
      <a href="archivos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="clientName">—</strong>
        <span id="clientCompany">—</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Portal de cliente</span>
      <!-- Búsqueda (desktop) -->
      <div class="search-bar" style="width:280px;">
        <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar documentos o videos…" />
      </div>
    </div>

    <div class="page-body">
      <!-- Búsqueda móvil -->
      <div class="search-bar search-bar--top">
        <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInputMobile" placeholder="Buscar documentos o videos…" />
      </div>
      <!-- Bienvenida -->
      <div style="margin-bottom:28px;">
        <h2 style="font-family:var(--f-display);font-size:1.5rem;font-weight:800;color:var(--c-heading);">Bienvenido, <span id="welcomeName">—</span></h2>
        <p style="color:var(--c-muted);font-size:0.9rem;margin-top:4px;">Aquí encuentras todos tus documentos, informes y capacitaciones personalizadas.</p>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="reports">Informes de visita</button>
        <button class="tab-btn" data-tab="videos">Capacitaciones</button>
        <button class="tab-btn" data-tab="presentations">Presentaciones</button>
      </div>

      <!-- Informes -->
      <div class="tab-panel active" id="tab-reports">
        <div class="file-list" id="reportsList">
          <div style="color:var(--c-muted);font-size:0.875rem;">Cargando…</div>
        </div>
      </div>

      <!-- Videos -->
      <div class="tab-panel" id="tab-videos">
        <div class="video-grid" id="videoGrid">
          <div style="color:var(--c-muted);font-size:0.875rem;">Cargando…</div>
        </div>
      </div>

      <!-- Presentaciones -->
      <div class="tab-panel" id="tab-presentations">
        <div class="file-list" id="presentationsList">
          <div style="color:var(--c-muted);font-size:0.875rem;">Cargando…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>

<!-- Archivo JS modular para la Gestión del Portal Cliente VIP -->
<script src="../assets/js/cliente/grande.js"></script>
</body>
</html>
