<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
  <style>
    .order-card { background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
    .order-card__header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; gap: 12px; flex-wrap: wrap; }
    .order-card__header:hover { background: var(--c-bg-alt); }
    .order-card__body { padding: 0 20px 16px; display: none; border-top: 1px solid var(--c-border); }
    .order-card__body.open { display: block; }
    .order-item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--c-border); font-size: 0.875rem; }
    .order-item-row:last-child { border-bottom: none; }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
    .status-pending    { background: rgba(245,158,11,0.12); color: #d97706; }
    .status-approved   { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .status-processing { background: rgba(139,92,246,0.12); color: #7c3aed; }
    .status-dispatched { background: rgba(16,185,129,0.12); color: #059669; }
    .status-completed  { background: rgba(107,114,128,0.12); color: #6b7280; }
  </style>
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" style="display:block;"><img src="../../logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__link" id="homeLink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Mi portal
      </a>
      <a href="catalogo.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Catálogo
      </a>
      <a href="pedidos.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Mis pedidos
      </a>
      <a href="archivos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="clientName">—</strong>
        <span id="clientCompany">—</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Mis Pedidos</span>
    </div>

    <div class="page-body">
      <div class="alert alert--success" id="successMsg"></div>
      <div class="alert alert--error"   id="errorMsg"></div>

      <!-- Stats rápidas -->
      <div class="stats-row" style="margin-bottom:24px;">
        <div class="card stat-card">
          <div class="stat-card__num" id="statTotal">—</div>
          <div class="stat-card__label">Total pedidos</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__num" id="statPending">—</div>
          <div class="stat-card__label">Pendientes</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__num" id="statCompleted">—</div>
          <div class="stat-card__label">Aprobados</div>
        </div>
      </div>

      <!-- Filtro por estado -->
      <div style="margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:0.85rem;color:var(--c-muted);">Filtrar:</span>
        <select id="statusFilter" class="form-select" style="width:auto;padding:7px 28px 7px 12px;font-size:0.85rem;">
          <option value="all">Todos</option>
          <option value="pending">Pendiente</option>
          <option value="approved">Aprobado</option>
        </select>
      </div>

      <!-- Lista de pedidos -->
      <div id="ordersList">
        <p style="color:var(--c-muted);font-size:0.875rem;">Cargando pedidos…</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal: detalle e historial de un pedido -->
<div class="modal-backdrop" id="orderDetailBackdrop">
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <div style="flex:1;min-width:0;">
        <div class="modal__title" id="detailCompany" style="font-size:1rem;">—</div>
        <div style="font-size:0.75rem;color:var(--c-muted);margin-top:2px;">
          Ticket <span id="detailTicket" style="font-weight:700;">—</span>
          <span class="status-badge" id="detailStatusBadge" style="margin-left:8px;vertical-align:middle;"></span>
        </div>
      </div>
      <button class="modal__close" id="closeOrderDetail">✕</button>
    </div>
    <div style="margin:16px 0 6px;font-size:0.72rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.06em;">Productos</div>
    <div id="detailItems"></div>
    <div style="margin:16px 0 6px;font-size:0.72rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.06em;">Historial</div>
    <div id="detailHistory"><p style="color:var(--c-muted);font-size:0.8rem;">Cargando…</p></div>
    <div id="detailActionWrap" style="margin-top:18px;display:none;">
      <button class="btn btn--primary" style="width:100%;" id="detailActionBtn">✓ Marcar como recibido</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/cliente/pedidos.js"></script>
</body>
</html>
