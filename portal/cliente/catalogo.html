<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Virtual — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
  <style>
    .catalog-row { display: flex; align-items: center; gap: 16px; padding: 14px 16px; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 10px; margin-bottom: 10px; }
    .catalog-row__img { width: 72px; height: 56px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--c-bg-alt); }
    .catalog-row__info { flex: 1; min-width: 0; }
    .catalog-row__title { font-weight: 700; font-size: 0.9rem; }
    .catalog-row__desc  { font-size: 0.78rem; color: var(--c-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .catalog-row__qty   { font-size: 0.78rem; color: var(--c-muted); margin-top: 2px; }
    .catalog-row__actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Carrito flotante */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed; top: 0; right: -400px; width: 370px; max-width: 100vw;
      height: 100vh; background: var(--c-bg); z-index: 201;
      display: flex; flex-direction: column;
      transition: right 0.3s ease; box-shadow: -4px 0 28px rgba(0,0,0,0.18);
    }
    .cart-panel.open { right: 0; }
    .cart-panel__header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid var(--c-border);
      font-weight: 700; font-size: 1rem;
    }
    .cart-panel__header button { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--c-muted); }
    .cart-panel__body { flex: 1; overflow-y: auto; padding: 8px 24px; }
    .cart-panel__empty { text-align: center; color: var(--c-muted); padding: 40px 0; font-size: 0.9rem; }
    .cart-panel__footer { padding: 16px 24px; border-top: 1px solid var(--c-border); display: flex; gap: 12px; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--c-border); }
    .cart-item__name { flex: 1; font-size: 0.85rem; line-height: 1.3; }
    .cart-item__qty { display: flex; align-items: center; gap: 6px; }
    .cart-item__qty button {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--c-border); background: var(--c-bg-alt);
      cursor: pointer; font-size: 1rem; line-height: 1;
    }
    .cart-item__qty span { min-width: 20px; text-align: center; font-weight: 600; font-size: 0.9rem; }
    .cart-item__remove { background: none; border: none; cursor: pointer; color: var(--c-muted); font-size: 1rem; padding: 4px; }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: #ef4444; color: #fff; border-radius: 50%;
      width: 18px; height: 18px; font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
  </style>
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" title="Volver al sitio principal" style="display:block;"><img src="../../logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <a href="#" class="sidebar__link" id="homeLink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Mi portal
      </a>
      <a href="catalogo.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Catálogo
      </a>
      <a href="pedidos.html" class="sidebar__link" id="pedidosLink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Mis pedidos
      </a>
      <a href="archivos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="clientName">—</strong>
        <span id="clientCompany">—</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Catálogo de Productos</span>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="search-bar" style="width:240px;">
          <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar producto..." style="font-size:0.875rem;" />
        </div>
        <!-- Botón carrito: solo visible para clientes -->
        <button class="btn btn--ghost btn--sm" id="cartBtn" style="position:relative;padding:8px 12px;display:none;" title="Mi pedido">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
        </button>
      </div>
    </div>

    <div class="page-body">
      <div class="alert alert--success" id="successMsg"></div>
      <div class="alert alert--error"   id="errorMsg"></div>

      <div style="margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="font-family:var(--f-display);font-size:1.4rem;font-weight:800;color:var(--c-heading);">Nuestros Productos</h2>
          <p style="color:var(--c-muted);font-size:0.85rem;margin-top:4px;">Explora el catálogo. Agrega productos a tu pedido y envíalo a tu comercial.</p>
        </div>
        <select id="categoryFilter" class="form-select" style="width:auto;padding:8px 32px 8px 12px;font-size:0.85rem;">
          <option value="all">Todas las categorías</option>
          <option value="Cocina">Cocina</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Institucional">Institucional</option>
          <option value="Lavandería">Lavandería</option>
        </select>
      </div>

      <div id="catalogGrid">
        <div style="color:var(--c-muted);font-size:0.875rem;">Cargando catálogo…</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal detalle de producto -->
<div class="modal-backdrop" id="productModal">
  <div class="modal" style="padding:0;overflow:hidden;max-width:540px;">
    <img id="modalImg" src="" alt="" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#eee;" />
    <div style="padding:24px;">
      <div class="modal__header" style="margin-bottom:8px;">
        <div>
          <h3 class="modal__title" id="modalTitle">Producto</h3>
          <span class="badge badge--large" id="modalCategory" style="margin-top:6px;">Categoría</span>
        </div>
        <button class="modal__close" id="closeModal">✕</button>
      </div>
      <p style="font-size:0.875rem;color:var(--c-body);line-height:1.6;" id="modalDesc"></p>
      <div class="modal__footer" style="flex-wrap:wrap;gap:10px;margin-top:20px;">
        <button id="modalAddCart" class="btn btn--primary" style="display:none;">+ Agregar al pedido</button>
      </div>
    </div>
  </div>
</div>

<!-- Panel del carrito -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-panel__header">
    <span>🛒 Mi pedido</span>
    <button id="closeCart">✕</button>
  </div>
  <div class="cart-panel__body" id="cartItems">
    <div class="cart-panel__empty">Tu pedido está vacío.<br>Agrega productos del catálogo.</div>
  </div>
  <div class="cart-panel__footer">
    <button class="btn btn--ghost" style="flex:1;" id="clearCart">Limpiar</button>
    <button class="btn btn--primary" style="flex:1;" id="sendOrderBtn">Enviar pedido</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/cliente/catalogo.js"></script>
</body>
</html>
