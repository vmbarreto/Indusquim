<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Virtual — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
  <style>
    .product-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--c-bg-alt); display: block; }
    /* Estética premium para clientes */
    .catalog-item { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .catalog-item:hover { transform: translateY(-4px); box-shadow: var(--sh-md); }
  </style>
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" title="Volver al sitio principal" style="display:block;"><img src="../../logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <!-- Cambiaremos el href principal con JS según tipo de cliente para que funcione el botón 'Mi Portal' -->
      <a href="#" class="sidebar__link" id="homeLink">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Mi portal
      </a>
      <a href="catalogo.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Catálogo Interactivo
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="clientName">—</strong>
        <span id="clientCompany">—</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Catálogo Virtual de Productos</span>
      <!-- Búsqueda en el tope (desktop) -->
      <div class="search-bar" style="width:280px;">
        <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar por producto..." style="font-size:0.875rem;" />
      </div>
    </div>
    
    <div class="page-body">
      <!-- Búsqueda móvil -->
      <div class="search-bar search-bar--top">
        <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInputMobile" placeholder="Buscar por producto..." />
      </div>

      <div style="margin-bottom:28px; display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <h2 style="font-family:var(--f-display);font-size:1.5rem;font-weight:800;color:var(--c-heading);">Nuestros Productos</h2>
          <p style="color:var(--c-muted);font-size:0.9rem;margin-top:4px;">Explora el catálogo completo y descubre las descripciones de nuestras referencias.</p>
        </div>
        
        <select id="categoryFilter" class="form-select" style="width: auto; padding: 8px 32px 8px 12px; font-size: 0.85rem;">
          <option value="all">Todas las Categorías</option>
          <option value="Limpieza">Limpieza</option>
          <option value="Desinfección">Desinfección</option>
          <option value="Industrial">Industrial</option>
          <option value="Hogar">Hogar</option>
        </select>
      </div>

      <!-- Cuadrícula de catálogo (reutilizando grid layout) -->
      <div class="video-grid" id="catalogGrid">
        <div style="color:var(--c-muted);font-size:0.875rem;">Cargando catálogo…</div>
      </div>

    </div>
  </div>
</div>

<!-- Modal para ver detalle de producto -->
<div class="modal-backdrop" id="productModal">
  <div class="modal" style="padding:0; overflow:hidden;">
    <img id="modalImg" src="" alt="" style="width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#eee;" />
    <div style="padding: 24px;">
      <div class="modal__header" style="margin-bottom:12px;">
        <div>
          <h3 class="modal__title" id="modalTitle">Producto</h3>
          <span class="badge badge--large" id="modalCategory" style="margin-top:6px;">Categoría</span>
        </div>
        <button class="modal__close" id="closeModal">✕</button>
      </div>
      <p style="font-size:0.9rem; color:var(--c-body); line-height:1.6;" id="modalDesc"></p>
      
      <div class="modal__footer">
        <a href="../../contacto.html" class="btn btn--primary">Solicitar Información</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/cliente/catalogo.js"></script>
</body>
</html>
