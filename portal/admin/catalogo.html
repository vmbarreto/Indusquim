<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
  <style>
    .product-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--c-bg-alt); display: block; }
  </style>
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo"><a href="../../index.html" title="Volver al sitio principal" style="display:block;"><img src="../../logo-indusquim-blanco.png" alt="Indusquim" /></a></div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <!-- Clientes: directorio de solo lectura, visible para Admin y Comercial -->
      <a href="clientes.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Clientes
      </a>
      <!-- Usuarios: solo Admin (gestión completa). Se oculta para Comerciales vía JS -->
      <a href="usuarios.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Usuarios
      </a>
      <a href="archivos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos y Videos
      </a>
      <a href="catalogo.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Catálogo
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user"><strong id="adminName">Administrador</strong>Indusquim</div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Catálogo Interactivo</span>
    </div>
    <div class="page-body">

      <div class="alert alert--success" id="successMsg"></div>
      <div class="alert alert--error"   id="errorMsg"></div>

      <!-- Add Product Form -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card__title">Añadir nuevo producto</div>
        <form id="productForm">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Nombre del producto</label>
              <input type="text" class="form-input" id="prodTitle" placeholder="Ej: Jabón Líquido Industrial" required />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Categoría</label>
              <select class="form-select" id="prodCategory" required>
                <option value="Limpieza">Limpieza</option>
                <option value="Desinfección">Desinfección</option>
                <option value="Industrial">Industrial</option>
                <option value="Hogar">Hogar</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">Descripción</label>
            <textarea class="form-input" id="prodDesc" rows="3" placeholder="Descripción detallada del producto…" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Imagen de portada</label>
            <div class="upload-area" id="prodDropArea">
              <div class="upload-area__icon">🖼️</div>
              <p><strong>Haz clic o arrastra</strong> una imagen</p>
              <p>JPG o PNG — Recomendado apaisado (16:9)</p>
            </div>
            <input type="file" id="prodFile" accept="image/*" style="display:none;" required />
          </div>
          <div class="progress-wrap" id="prodProgress" style="display:none;margin-bottom:12px;">
            <div class="progress-bar" id="prodProgressBar"></div>
          </div>
          <button type="submit" class="btn btn--primary" id="prodSubmit">Guardar Producto</button>
        </form>
      </div>

      <!-- Products Grid -->
      <div class="card">
        <div class="card__title" style="display:flex;align-items:center;justify-content:space-between;">
          Productos Existentes
          <div class="search-bar" style="width:240px;">
            <svg class="search-bar__icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="prodSearch" placeholder="Buscar por nombre…" style="font-size:0.8rem;" />
          </div>
        </div>
        <div class="video-grid" id="catalogList">
          <p style="color:var(--c-muted);font-size:0.875rem;">Cargando…</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/admin/catalogo.js"></script>
</body>
</html>
