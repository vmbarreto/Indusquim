<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Indusquim Portal</title>
  <link rel="stylesheet" href="../assets/css/portal.css" />
</head>
<body>
<div class="portal-wrap">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="../../index.html" title="Volver al sitio principal" style="display:block;">
        <img src="../../logo-indusquim-blanco.png" alt="Indusquim" />
      </a>
    </div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__link active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="usuarios.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Usuarios
      </a>
      <a href="archivos.html" class="sidebar__link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Archivos y Videos
      </a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <strong id="adminName">Administrador</strong>
        Indusquim
      </div>
      <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menú"><span></span><span></span><span></span></button>
      <span class="topbar__title">Dashboard</span>
    </div>
    <div class="page-body">

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="card stat-card">
          <div class="stat-card__num" id="totalClients">—</div>
          <div class="stat-card__label">Total de clientes</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__num" id="largeClients">—</div>
          <div class="stat-card__label">Clientes grandes</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__num" id="smallClients">—</div>
          <div class="stat-card__label">Clientes pequeños</div>
        </div>
        <div class="card stat-card">
          <div class="stat-card__num" id="totalDocs">—</div>
          <div class="stat-card__label">Documentos subidos</div>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card__title">Accesos rápidos</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <a href="usuarios.html" class="btn btn--primary">+ Crear usuario</a>
          <a href="archivos.html" class="btn btn--outline">Subir archivo</a>
        </div>
      </div>

      <!-- Últimos clientes -->
      <div class="card">
        <div class="card__title">Clientes recientes</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Empresa</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="recentClients">
              <tr><td colspan="4" style="text-align:center;color:var(--c-muted);padding:24px;">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  (async () => {
    const profile = await requireAdmin();
    if (!profile) return;
    document.getElementById('adminName').textContent = profile.full_name || 'Admin';

    // Stats
    const { data: clients } = await sb.from('profiles').select('client_type').eq('role', 'client');
    const { data: docs }    = await sb.from('documents').select('id');
    const large = (clients || []).filter(c => c.client_type === 'large').length;
    const small = (clients || []).filter(c => c.client_type === 'small').length;
    document.getElementById('totalClients').textContent = (clients || []).length;
    document.getElementById('largeClients').textContent = large;
    document.getElementById('smallClients').textContent = small;
    document.getElementById('totalDocs').textContent    = (docs || []).length;

    // Recientes
    const { data: recent } = await sb.from('profiles')
      .select('full_name, company_name, client_type, created_at')
      .eq('role', 'client')
      .order('created_at', { ascending: false })
      .limit(5);

    const tbody = document.getElementById('recentClients');
    if (!recent || recent.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--c-muted);padding:24px;">Sin clientes aún</td></tr>';
    } else {
      tbody.innerHTML = recent.map(r => `
        <tr>
          <td><strong>${r.company_name || '—'}</strong></td>
          <td>${r.full_name || '—'}</td>
          <td><span class="badge badge--${r.client_type === 'large' ? 'large' : 'small'}">${r.client_type === 'large' ? 'Grande' : 'Pequeño'}</span></td>
          <td>${new Date(r.created_at).toLocaleDateString('es-CO')}</td>
        </tr>`).join('');
    }

    document.getElementById('logoutBtn').onclick = () => logout();
  })();
  // Hamburger
  const hbg = document.getElementById('hamburger');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  function toggleSidebar() {
    sidebar.classList.toggle('open');
    hbg.classList.toggle('open');
    overlay.classList.toggle('show');
  }
  hbg.addEventListener('click', toggleSidebar);
  overlay.addEventListener('click', toggleSidebar);
</script>
</body>
</html>
